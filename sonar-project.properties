# SonarQube Configuration for Django Gym Project
# This file contains rules to suppress known false positives

# Suppress S2068 (potential hard-coded credential detection) for UI labels
# These are Django form field labels and placeholders, NOT actual credentials
sonar.issue.ignore.multicriteria=S2068.forms

# FormField labels and placeholders containing "password" word
# These are UI strings for password input fields, not actual credentials
sonar.issue.ignore.multicriteria.S2068.forms.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.S2068.forms.resourceKey=memberships/forms.py
