{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Gym Management{% endblock %}</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom Styles -->
    <link
      rel="stylesheet"
      href="{% static 'memberships/styles.css' %}"
    />

    {% block extra_css %}{% endblock %}
  </head>

  <body>
    <div class="layout">
      <!-- NAVBAR -->
      <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
          <a
            class="navbar-brand fw-bold"
            href="/"
            >🏋 Gym Admin</a
          >

          <div>
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/memberships/"
                  >Planes</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="#"
                  >Miembros</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="#"
                  >Pagos</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="#"
                  >Reportes</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <!-- CONTENIDO -->
      <main class="content container mt-5">{% block content %} {% endblock %}</main>

      <!-- FOOTER -->
      <footer class="footer">© {{ now|date:"Y" }} Gym Management System</footer>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
